<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="nodegrid-mark-title nodegrid-mark-desc">
  <title id="nodegrid-mark-title">NodeGrid icon</title>
  <desc id="nodegrid-mark-desc">A square NodeGrid app icon with a connected grid and terminal prompt.</desc>
  <defs>
    <linearGradient id="nodegrid-mark-bg" x1="76" y1="58" x2="434" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121A26"/>
      <stop offset="1" stop-color="#07090D"/>
    </linearGradient>
    <linearGradient id="nodegrid-mark-stroke" x1="112" y1="104" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00BFFF"/>
      <stop offset="1" stop-color="#00FFAA"/>
    </linearGradient>
    <filter id="nodegrid-mark-glow" x="58" y="42" width="396" height="396" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="14" result="effect1_foregroundBlur"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="384" height="384" rx="86" fill="url(#nodegrid-mark-bg)"/>
  <rect x="65.5" y="65.5" width="381" height="381" rx="84.5" stroke="#243550" stroke-width="3"/>

  <g opacity="0.9">
    <path d="M148 176H364" stroke="#1A2840" stroke-width="4"/>
    <path d="M148 256H364" stroke="#1A2840" stroke-width="4"/>
    <path d="M148 336H364" stroke="#1A2840" stroke-width="4"/>
    <path d="M176 148V364" stroke="#1A2840" stroke-width="4"/>
    <path d="M256 148V364" stroke="#1A2840" stroke-width="4"/>
    <path d="M336 148V364" stroke="#1A2840" stroke-width="4"/>
  </g>

  <g filter="url(#nodegrid-mark-glow)">
    <path d="M176 176H256H336V256V336H256H176V256H256V336" stroke="url(#nodegrid-mark-stroke)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <path d="M206 222L244 256L206 290" stroke="#B8CCE0" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M276 296H318" stroke="#B8CCE0" stroke-width="18" stroke-linecap="round"/>

  <circle cx="176" cy="176" r="14" fill="#00BFFF"/>
  <circle cx="256" cy="176" r="14" fill="#73E4FF"/>
  <circle cx="336" cy="176" r="14" fill="#00FFAA"/>
  <circle cx="336" cy="256" r="14" fill="#73E4FF"/>
  <circle cx="336" cy="336" r="14" fill="#00FFAA"/>
  <circle cx="256" cy="336" r="14" fill="#73E4FF"/>
  <circle cx="176" cy="336" r="14" fill="#00BFFF"/>
  <circle cx="176" cy="256" r="14" fill="#73E4FF"/>
  <circle cx="256" cy="256" r="14" fill="#B8CCE0"/>
</svg>
