name: Full Auto Tauri Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "*.md"
      - "docs/**"
      - "CHANGELOG.md"
      - "package.json"
      - "src-tauri/tauri.conf.json"

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.bump.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Calculate Next Version
        id: bump
        run: |
          BASE_VERSION="1.12"

          COUNT=$(git tag | grep "^v$BASE_VERSION" | wc -l)
          PATCH=$((COUNT + 1))

          VERSION="$BASE_VERSION.$PATCH"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update tauri.conf.json
        run: |
          jq ".version=\"${{ steps.bump.outputs.version }}\"" src-tauri/tauri.conf.json > temp.json
          mv temp.json src-tauri/tauri.conf.json

      - name: Update package.json
        run: |
          jq ".version=\"${{ steps.bump.outputs.version }}\"" package.json > temp.json
          mv temp.json package.json

      - name: Generate CHANGELOG.md
        run: |
          echo "## v${{ steps.bump.outputs.version }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log -10 --pretty=format:"- %s" >> CHANGELOG.md

      - name: Commit & Tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag v${{ steps.bump.outputs.version }}
          git push origin main --tags

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri App
        run: npm run tauri build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.tar.gz
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.sig

  release:
    needs: [version, build]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: |
          git fetch --tags
          git tag

      # =====Prevent GitHub API race condition=====
      - name: Wait for tag propagation
        run: sleep 10

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
